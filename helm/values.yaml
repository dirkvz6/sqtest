replicaCount: 1

image:
  repository: 974303038165.dkr.ecr.af-south-1.amazonaws.com/sanquote/demo
  tag: "v1.1.2"
  pullPolicy: IfNotPresent

imagePullSecrets: []

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automount: true

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5

autoscaling:
  enabled: false

volumes: []
volumeMounts: []

#  ConfigMap content served by Nginx as index.html
config:
  title: "Sanquote App"
  greeting: "Hello 👋"
  message: |-
    "This is a test page served by Nginx.  ConfigMap was mounted at /usr/share/nginx/html."
    
# Ingress configuration
ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: "k8s-sqw-sanquote-ui-dev.slm-sra-shared-eks.nprd.aws.sanlamcloud.co.za"
      paths:
        - path: /
          pathType: Prefix
